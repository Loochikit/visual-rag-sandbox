services:
  - type: web
    name: visual-rag-sandbox
    runtime: docker
    plan: free
    envVars:
      - key: PORT
        value: 4000
      - key: OPENAI_API_KEY
        sync: false
        placeholder: "Optional: Paste OpenAI API Key for live LLM integrations"
      - key: GEMINI_API_KEY
        sync: false
        placeholder: "Optional: Paste Gemini API Key for live LLM integrations"
